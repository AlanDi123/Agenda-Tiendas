name: Build Android APK

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Código fuente ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Instalar dependencias ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build del frontend (Capacitor: URL pública del API; con Vercel unificado = mismo host que la web, ej. https://agenda-tienda.vercel.app)
      - name: Build Web App
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── 4b. Empaquetar bundle web para OTA ───────────────────────────────
      - name: Package web bundle for OTA
        run: |
          cd dist && zip -r ../bundle.zip . && cd ..
          echo "bundle.zip size: $(du -sh bundle.zip | cut -f1)"

      # ── 5. Java ───────────────────────────────────────────────────────────
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── 6. Android SDK (explícito para garantizar SDK 35) ────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "Android SDK 35 ready"

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # ── 7. Capacitor sync (usa la versión ya instalada en package.json) ───
      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. Gradle build ───────────────────────────────────────────────────
      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m"

      # ── 9. Subir artefacto APK ────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dommuss-Agenda-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 10. Subir bundle.zip para OTA ───────────────────────────────────────
      - name: Upload bundle.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle.zip
          path: bundle.zip
          retention-days: 30

      # ── 11. Este workflow solo compila artifacts internos ───────────────────
      #      El manifest público de updates lo publica android-release.yml
      - name: Skip backend version manifest update
        run: echo "Skipping backend manifest update in build-apk.yml"
