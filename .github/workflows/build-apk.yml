name: Build Android APK

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Código fuente ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Instalar dependencias ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build del frontend (inyectando la URL del backend real) ────────
      - name: Build Web App
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── 5. Java ───────────────────────────────────────────────────────────
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── 6. Android SDK (explícito para garantizar SDK 34) ────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 34
        run: |
          echo y | sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "Android SDK 34 ready"

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # ── 7. Capacitor sync (usa la versión ya instalada en package.json) ───
      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. Gradle build ───────────────────────────────────────────────────
      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m"

      # ── 9. Subir artefacto ────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dommuss-Agenda-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
