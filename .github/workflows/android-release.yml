name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.4.2)'
        required: false
        default: 'auto'

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m"
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

jobs:
  # ============================================
  # BUILD JOB - Build and sign APK
  # ============================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      apk_path: ${{ steps.build.outputs.apk_path }}
      is_release: ${{ steps.check_release.outputs.is_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Determine version
        id: version
        run: |
          # Check if this is a tag push
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION_NAME=${GITHUB_REF#refs/tags/v}
            IS_RELEASE=true
          # Check if workflow dispatched with version
          elif [[ "${{ github.event.inputs.version }}" != "auto" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION_NAME=${{ github.event.inputs.version }}
            IS_RELEASE=true
          # Otherwise use commit-based versioning
          else
            COMMIT_NUM=$(git rev-list --count HEAD)
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION_NAME="0.0.${COMMIT_NUM}"
            IS_RELEASE=false
          fi

          # Convert version to code (e.g., 1.4.2 -> 10402)
          VERSION_CODE=$(echo "$VERSION_NAME" | awk -F. '{ printf "%d%02d%02d", $1, $2, $3 }')

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Built version: $VERSION_NAME ($VERSION_CODE)"

      - name: Check if release tag
        id: check_release
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode and write keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "Keystore written successfully"

      - name: Create keystore.properties
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cat > android/app/keystore.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../keystore.jks
          EOF
          echo "keystore.properties created"
          cat android/app/keystore.properties

      - name: Update Gradle version
        working-directory: android
        run: |
          # Update version in build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.version_name }}\"/" app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.version_code }}/" app/build.gradle
          echo "Updated to version ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})"

      - name: Build APK (Gradle)
        id: build
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --stacktrace

          # Find the APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Built APK: $APK_PATH"

      - name: Sign APK
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: android
        run: |
          APK_PATH="${{ steps.build.outputs.apk_path }}"
          UNSIGNED_APK="$APK_PATH"
          SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"

          # Sign the APK using apksigner if available, otherwise jarsigner
          if [ -f keystore.jks ]; then
            # Try apksigner first (preferred for Android)
            if command -v apksigner &> /dev/null; then
              apksigner sign \
                --ks keystore.jks \
                --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
                --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
                --out "$SIGNED_APK" \
                "$UNSIGNED_APK"
            else
              # Fallback to jarsigner
              jarsigner -verbose \
                -keystore keystore.jks \
                -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
                -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
                "$UNSIGNED_APK" \
                "${{ secrets.ANDROID_KEY_ALIAS }}"

              # Align the APK
              zipalign -v -p 4 "$UNSIGNED_APK" "$SIGNED_APK"
            fi

            # Verify signature
            if command -v apksigner &> /dev/null; then
              apksigner verify --verbose "$SIGNED_APK"
            else
              jarsigner -verify -verbose -certs "$SIGNED_APK"
            fi

            echo "Signed APK: $SIGNED_APK"
            echo "apk_path=$SIGNED_APK" >> $GITHUB_OUTPUT
          else
            echo "Warning: Keystore not found, APK will not be signed"
            echo "apk_path=$UNSIGNED_APK" >> $GITHUB_OUTPUT
          fi
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: ${{ steps.build.outputs.apk_path }}
          retention-days: 30

      - name: Generate version manifest
        id: manifest
        run: |
          cat > version-manifest.json << EOF
          {
            "latestVersion": "${{ steps.version.outputs.version_name }}",
            "versionCode": ${{ steps.version.outputs.version_code }},
            "mandatory": false,
            "minVersion": "0.0.1",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version_name }}/app-release-signed.apk",
            "changelog": "Build ${{ github.run_number }} - Commit ${{ github.sha }}",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "buildNumber": ${{ github.run_number }},
            "commitSha": "${{ github.sha }}"
          }
          EOF
          cat version-manifest.json

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-manifest.json
          path: version-manifest.json
          retention-days: 30

  # ============================================
  # RELEASE JOB - Create GitHub Release
  # ============================================
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk
          path: ./apk

      - name: Download manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: version-manifest.json
          path: ./manifest

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ needs.build.outputs.version_name }}
          release_name: "Release v${{ needs.build.outputs.version_name }}"
          body: |
            ## Dommuss Agenda v${{ needs.build.outputs.version_name }}

            ### Build Information
            - Build Number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Date: $(date -u +%Y-%m-%d)

            ### Installation
            1. Download the APK file below
            2. Enable "Install from Unknown Sources" on your Android device
            3. Open the APK file and follow installation prompts

            ### Changelog
            - See version manifest for details

            ⚠️ **Note**: This is an Android APK. Install only on Android devices.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./apk/app-release-signed.apk
          asset_name: app-release-signed.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload manifest to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./manifest/version-manifest.json
          asset_name: version-manifest.json
          asset_content_type: application/json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update backend manifest (optional)
        if: ${{ secrets.BACKEND_MANIFEST_URL != '' && secrets.BACKEND_MANIFEST_KEY != '' }}
        run: |
          curl -X POST "${{ secrets.BACKEND_MANIFEST_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.BACKEND_MANIFEST_KEY }}" \
            -d @./manifest/version-manifest.json \
            || echo "Failed to update backend manifest"
